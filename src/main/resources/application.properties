# Server
server.port=8082
spring.application.name=healthcaregov-notification

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/healthcaregov_notification?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=HealthCareGovSecretKeyForJWTMustBe256BitsLongAndSecure!
app.jwt.expiration-ms=86400000

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.com.healthcaregov=INFO
logging.level.org.springframework.security=WARN
